add_newline = false

format = """
$python\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_metrics\
$direnv\
$line_break\
$status\
$cmd_duration\
$jobs\
$character\
"""

[python]
symbol = ' '
format = '$symbol(${version}) (($virtualenv)) '
pyenv_version_name = false

[custom.logo]
command = "echo 󱗆 "
when = "true"
style = "bold #ff003c"

[username]
style_user = "bold #ff003c"  # bright blood red
style_root = "bold #ff003c"
format = "[󱗆 $symbol$user]($style) "
show_always = true

[hostname]
ssh_only = true
format = "@[$hostname]($style) "
style = "bold #00bfff"  # bright azure blue

[directory]
truncation_length = 3
truncate_to_repo = true
format = "[$path]($style) "
style = "bold #1e90ff"  # DodgerBlue (bright and readable)
read_only = " "

[git_branch]
format = "[$symbol$branch]($style) "
style = "bold white"
symbol = " "

[git_status]
format = "[$all_status$ahead_behind]($style) "
style = "bold #ff1493"  # DeepPink for a vivid, stylish contrast
conflicted = "="
ahead = "⇡$count"
behind = "⇣$count"
diverged = "⇕"
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"

[git_metrics]
disabled = false
format = "([+$added]($added_style) )([-$deleted]($deleted_style) )"
added_style = "bold #55b9ff"
deleted_style = "bold #ff003c"

[direnv]
disabled = false
format = "[$symbol$loaded]($style) "
symbol = "󰘦 "
style = "bold #55b9ff"

[status]
disabled = false
format = "[$symbol$status]($style) "
symbol = "✘ "
style = "bold #ff003c"

[cmd_duration]
min_time = 2_000
format = "[󱎫 $duration]($style) "
style = "bold #55b9ff"

[jobs]
symbol = "✦ "
number_threshold = 1
format = "[$symbol$number]($style) "
style = "bold #55b9ff"

[character]
success_symbol = "[❯](bold #ffffff)"   # bright white
error_symbol = "[❯](bold #ff003c)"     # bright red
vicmd_symbol = "[❮](bold #9b30ff)"     # bright violet
