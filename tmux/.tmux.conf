unbind r
bind r source-file ~/.tmux.conf

set -g prefix M-s
set -g mouse on
set -g focus-events on
set -sg escape-time 0
set -g set-clipboard on

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key s choose-tree -Zs
bind-key - split-window -v -c "#{pane_current_path}"
bind-key \\ split-window -h -c "#{pane_current_path}"
bind-key Enter last-window

bind-key b set-option status
# set -g default-terminal "xterm-256color"
set -g default-terminal "xterm-kitty"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-features ",xterm-kitty:RGB"

# vim and copy mode
set-window-option -g mode-keys vi  # Vi-style copy/paste
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection

# Use `xclip` (Linux/WSL) or `pbcopy` (macOS)
# bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"  # Linux
# bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"  # macOS
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"  # Wayland

#================================================================================
# THEME CONFIGURATION
#================================================================================

# low-noise visual system
set -g status on
set -g status-position top
set -g status-justify left
set -g status-interval 5

set -g status-style "bg=#111317,fg=#aeb6c2"
set -g message-style "bg=#1b1f27,fg=#e6e9ef"
set -g message-command-style "bg=#1b1f27,fg=#7aa2f7"
set -g mode-style "bg=#7aa2f7,fg=#111317,bold"

set -g pane-border-style "fg=#3a4150"
set -g pane-active-border-style "fg=#7aa2f7"

set -g window-status-separator ""
set -g window-status-style "bg=#111317,fg=#7c8595"
set -g window-status-current-style "bg=#7aa2f7,fg=#111317,bold"
set -g window-status-activity-style "bg=#111317,fg=#e0af68,bold"
set -g window-status-bell-style "bg=#f7768e,fg=#111317,bold"
set -g window-status-format " #[fg=#5b6272]#I #[fg=#7c8595]#W "
set -g window-status-current-format " #[fg=#111317,bold]#I #[fg=#111317,bold]#W "

set -g status-left-length 40
set -g status-left "#{?client_prefix,#[fg=#e0af68]  ,#[fg=#7aa2f7]  }#[fg=#d7dce2]#S "

set -g status-right-length 80
set -g status-right "#[fg=#5b6272]%Y-%m-%d #[fg=#d7dce2]%H:%M #[fg=#5b6272]| #[fg=#7aa2f7]#H "


# Floating terminal popup
bind-key f display-popup -E -w 80% -h 80% -x C -y C $SHELL

# this lives, but it is a session inside a session
bind-key q display-popup -E -w 80% -h 80% -x C -y C "tmux new-session -A -s popup"
