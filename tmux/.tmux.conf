unbind r
bind r source-file ~/.tmux.conf

set -g prefix M-s
set -g mouse on
set -g focus-events on
set -sg escape-time 0
set -g set-clipboard on

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key s choose-tree -Zs
bind-key - split-window -v -c "#{pane_current_path}"
bind-key \\ split-window -h -c "#{pane_current_path}"
bind-key Enter last-window

bind-key b set-option status
# set -g default-terminal "xterm-256color"
set -g default-terminal "xterm-kitty"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-features ",xterm-kitty:RGB"

# vim and copy mode
set-window-option -g mode-keys vi  # Vi-style copy/paste
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection

# Use `xclip` (Linux/WSL) or `pbcopy` (macOS)
# bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"  # Linux
# bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"  # macOS
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"  # Wayland

#================================================================================
# THEME CONFIGURATION
#================================================================================

# low-noise visual system
set -g status on
set -g status-position top
set -g status-justify left
set -g status-interval 5

set -g status-style "bg=#121a2f,fg=#d2d9e3"
set -g message-style "bg=#1d2740,fg=#f0f4fb"
set -g message-command-style "bg=#1d2740,fg=#9ec5ff"
set -g mode-style "bg=#9ec5ff,fg=#121a2f,bold"

set -g pane-border-style "fg=#45556f"
set -g pane-active-border-style "fg=#c24f5a"

set -g window-status-separator ""
set -g window-status-style "bg=#121a2f,fg=#aab4c2"
set -g window-status-current-style "bg=#5a8cff,fg=#121a2f,bold"
set -g window-status-activity-style "bg=#121a2f,fg=#c24f5a,bold"
set -g window-status-bell-style "bg=#121a2f,fg=#c24f5a,bold"
set -g window-status-format " #[fg=#70839b]#I #[fg=#aab4c2]#W "
set -g window-status-current-format " #[fg=#121a2f,bold]#I #[fg=#121a2f,bold]#W "

set -g status-left-length 40
set -g status-left "#{?client_prefix,#[bg=#5a8cff]#[fg=#121a2f]  #[bg=#121a2f],#[bg=#121a2f]#[fg=#9ec5ff]  #[bg=#121a2f]} #[fg=#e7edf7]#S "

set -g status-right-length 80
set -g status-right "#[fg=#70839b]%Y-%m-%d #[fg=#e7edf7]%H:%M #[fg=#70839b]| #[fg=#9ec5ff]#H "


# Floating terminal popup
bind-key f display-popup -E -w 80% -h 80% -x C -y C $SHELL

# this lives, but it is a session inside a session
bind-key q display-popup -E -w 80% -h 80% -x C -y C "tmux new-session -A -s popup"
